<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Hintergrund -->
  <rect width="64" height="64" rx="12" fill="#252a2e"/>

  <!-- Farbrolle (Zylinder) -->
  <rect x="4" y="8" width="40" height="18" rx="9" fill="#b0552d"/>
  <!-- Glanzstreifen oben auf der Rolle -->
  <rect x="6" y="10" width="36" height="5" rx="2.5" fill="rgba(255,255,255,0.18)"/>
  <!-- Schatten unten auf der Rolle -->
  <rect x="4" y="21" width="40" height="5" rx="0" fill="rgba(0,0,0,0.18)"/>

  <!-- Griff-Arm (vertikal rechts) -->
  <rect x="40" y="15" width="5" height="22" rx="2.5" fill="#c8a060"/>

  <!-- Griff (horizontal) -->
  <rect x="40" y="33" width="19" height="5" rx="2.5" fill="#c8a060"/>

  <!-- Farbtropfen unter der Rolle -->
  <rect x="8"  y="26" width="6" height="13" rx="3" fill="#8a3e1c" opacity="0.7"/>
  <rect x="20" y="26" width="6" height="19" rx="3" fill="#8a3e1c" opacity="0.7"/>
  <rect x="32" y="26" width="6" height="10" rx="3" fill="#8a3e1c" opacity="0.7"/>
</svg>
