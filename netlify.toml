# Netlify deployment configuration
[build]
  # The directory to deploy is 'landingpage' (where index.html sits)
  publish = "landingpage"
  # No build process needed — this is a static site
  command = ""

[context.production]
  environment = { SITE_NAME = "Maler Sert GmbH" }

# Rewrite rules for clean URLs (optional)
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Cache rules for images
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
